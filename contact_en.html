<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;padding:24px;background:#f7f7f7;color:#111}
    .container{max-width:700px;margin:40px auto;background:#fff;padding:24px;border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,0.06)}
    label{display:block;margin-top:10px}
    input,textarea{width:100%;padding:8px;margin-top:6px;border:1px solid #ddd;border-radius:4px}
    button{margin-top:12px;padding:10px 14px;background:#2b6cb0;color:#fff;border:0;border-radius:4px;cursor:pointer}
  </style>
</head>
<body>
  <div class="container">
    <header>Contact</header>
    <p>Contact us using the form below:</p>
    <form id="contactForm" method="post" action="#">
      <label for="name">Name</label>
      <input id="name" name="name" required />

      <label for="email">Email</label>
      <input id="email" name="email" type="email" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" required></textarea>

      <button type="submit">Send</button>
    </form>

    <p style="margin-top:18px"><a href="index.html">← Back to Home</a></p>
  </div>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e){
      e.preventDefault();
      alert('Thanks! The form is not actually sent (example).');
      this.reset();
    });
  </script>
</body>
</html>
