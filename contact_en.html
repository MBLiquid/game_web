<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact</title>
  <style>
    :root { --bg: #0f172a; --panel: #111827; --muted: #aaa; }
    html,body{height:100%;margin:0;padding:0;background:var(--bg);color:#fff;font-family:Arial,Helvetica,sans-serif}
    header{padding:12px 16px;background:var(--panel);text-align:center;font-weight:700}
    main{max-width:700px;margin:28px auto;padding:18px}
    .card{background:#071026;padding:20px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,0.35)}
    label{display:block;margin-top:10px}
    input,textarea{width:100%;padding:8px;margin-top:6px;border:1px solid #16324a;border-radius:4px;background:#081428;color:#fff}
    button{margin-top:12px;padding:10px 14px;background:#2b6cb0;color:#fff;border:0;border-radius:4px;cursor:pointer}
  </style>
</head>
<body>
  <header>🎮 ONLINE GAME</header>
  <main>
    <div class="card">
      <h1>Contact</h1>
      <form id="contactForm" method="post" action="#">
        <label for="name">Name</label>
        <input id="name" name="name" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button type="submit">Send</button>
      </form>
      <p style="margin-top:18px"><a href="index.html">← Back to Home</a></p>
    </div>
  </main>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e){
      e.preventDefault();
      alert('Thanks! The form is not actually sent (example).');
      this.reset();
    });
  </script>
  <script src="//code.jivo.ru/widget/scivO01DkR" async></script>
</body>
</html>
