<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PLAY GAME</title>

    <!-- Мобильная адаптация -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="description" content="Онлайн мини игра. Играй прямо в браузере с любого устройства.">
    <meta name="keywords" content="игра онлайн, браузерная игра, мини игра">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #fff;
            text-align: center;
        }

        header {
            padding: 15px;
            background: #111827;
            font-size: 20px;
            font-weight: bold;
        }

        .game-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .game-container {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            padding: 15px;
            font-size: 14px;
            color: #aaa;
        }

        /* Мобильная оптимизация */
        @media (max-width: 600px) {
            header {
                font-size: 16px;
            }

            .game-container {
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

<header>
    🎮 Vortex Ball
</header>

<div class="game-wrapper">
    <div class="game-container">
        <!-- ВСТАВЬ СЮДА СВОЮ ИГРУ -->
        
        <iframe src="https://html5.gamedistribution.com/22c23c982349439294e9a3d0d55b7a76/?gd_sdk_referrer_url=https://zoneunfolded.onrender.com" allowfullscreen></iframe>
    </div>
	<!-- Banner 1 -->
	<div id="adBannerWrapper1" class="ad-banner-wrapper">
		<img id="adImage1" src="pict/pict1.gif" alt="">
		<span id="adCloseBtn1" class="ad-close-button">&times;</span>
	</div>
	
	<!-- Banner 2 -->
	<div id="adBannerWrapper2" class="ad-banner-wrapper">
		<img id="adImage2" src="pict/pict2.gif" alt="">
	</div> 
</div>


<footer>
    © 2026 Все права защищены
</footer>

</body>
</html>
